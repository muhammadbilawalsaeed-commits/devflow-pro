<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS LayoutLab & UI Studio — DevFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .preview-box { transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur py-4 mb-8">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-cubes text-cyan-400 text-2xl"></i>
                <h1 class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">CSS LayoutLab & UI Studio</h1>
            </div>
            <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold px-4 py-2 rounded-xl border border-slate-700 transition">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to DevFlow Pro
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Sidebar Controls -->
        <div class="lg:col-span-4 space-y-6">
            <div class="glass-card p-6 rounded-2xl space-y-5">
                <h2 class="text-lg font-bold text-slate-200 border-b border-slate-800 pb-3"><i class="fa-solid fa-sliders text-cyan-400 mr-2"></i> Layout Controls</h2>

                <!-- Display Mode -->
                <div>
                    <label class="text-xs font-semibold text-slate-400 block mb-2">DISPLAY TYPE</label>
                    <select id="displayType" onchange="updateLayout()" class="w-full bg-slate-900 border border-slate-700 text-sm text-slate-200 p-2.5 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none">
                        <option value="flex">Flexbox</option>
                        <option value="grid">CSS Grid</option>
                    </select>
                </div>

                <!-- Flex Direction -->
                <div id="flexDirGroup">
                    <label class="text-xs font-semibold text-slate-400 block mb-2">FLEX DIRECTION</label>
                    <select id="flexDirection" onchange="updateLayout()" class="w-full bg-slate-900 border border-slate-700 text-sm text-slate-200 p-2.5 rounded-xl outline-none">
                        <option value="row">Row (Horizontal)</option>
                        <option value="column">Column (Vertical)</option>
                    </select>
                </div>

                <!-- NEW: Flex Wrap Toggle -->
                <div id="flexWrapGroup">
                    <label class="text-xs font-semibold text-slate-400 block mb-2">FLEX WRAP</label>
                    <select id="flexWrap" onchange="updateLayout()" class="w-full bg-slate-900 border border-slate-700 text-sm text-slate-200 p-2.5 rounded-xl outline-none">
                        <option value="nowrap">No Wrap (Single Line)</option>
                        <option value="wrap">Wrap (Multi-line)</option>
                    </select>
                </div>

                <!-- Justify Content -->
                <div>
                    <label class="text-xs font-semibold text-slate-400 block mb-2">JUSTIFY CONTENT</label>
                    <select id="justifyContent" onchange="updateLayout()" class="w-full bg-slate-900 border border-slate-700 text-sm text-slate-200 p-2.5 rounded-xl outline-none">
                        <option value="flex-start">Start</option>
                        <option value="center" selected>Center</option>
                        <option value="flex-end">End</option>
                        <option value="space-between">Space Between</option>
                        <option value="space-around">Space Around</option>
                    </select>
                </div>

                <!-- Gap Slider -->
                <div>
                    <div class="flex justify-between text-xs font-semibold text-slate-400 mb-2">
                        <span>GAP SPACING</span>
                        <span id="gapVal" class="text-cyan-400">16px</span>
                    </div>
                    <input type="range" id="gap" min="0" max="50" value="16" oninput="updateLayout()" class="w-full accent-cyan-500 bg-slate-900">
                </div>

                <!-- Border Radius Slider -->
                <div>
                    <div class="flex justify-between text-xs font-semibold text-slate-400 mb-2">
                        <span>BORDER RADIUS</span>
                        <span id="radiusVal" class="text-cyan-400">12px</span>
                    </div>
                    <input type="range" id="borderRadius" min="0" max="40" value="12" oninput="updateLayout()" class="w-full accent-cyan-500 bg-slate-900">
                </div>

                <!-- NEW: Modern UI Style Presets -->
                <div class="pt-2 border-t border-slate-800">
                    <label class="text-xs font-semibold text-slate-400 block mb-2">SPECIAL UI STYLES</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setStyle('flat')" id="btn-flat" class="text-xs bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 font-bold py-2 rounded-xl">Flat</button>
                        <button onclick="setStyle('glass')" id="btn-glass" class="text-xs bg-slate-800 text-slate-400 border border-slate-700 font-bold py-2 rounded-xl hover:text-white">Glass</button>
                        <button onclick="setStyle('neumorphic')" id="btn-neu" class="text-xs bg-slate-800 text-slate-400 border border-slate-700 font-bold py-2 rounded-xl hover:text-white">Neumorphic</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Live Playground & Output -->
        <div class="lg:col-span-8 space-y-6">
            
            <!-- Live Preview Area -->
            <div class="glass-card p-6 rounded-2xl min-h-[380px] flex flex-col justify-between">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-eye text-cyan-400 mr-2"></i> Live Canvas</span>
                    <div class="space-x-2">
                        <button onclick="addBox()" class="text-xs bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold px-3 py-1.5 rounded-lg transition">+ Add Item</button>
                        <button onclick="removeBox()" class="text-xs bg-rose-500/20 hover:bg-rose-500/30 text-rose-400 font-bold px-3 py-1.5 rounded-lg transition">- Remove</button>
                    </div>
                </div>

                <!-- Interactive Container -->
                <div id="layoutContainer" class="w-full min-h-[260px] p-4 bg-slate-950/60 rounded-xl border border-slate-800/80 flex flex-wrap justify-center items-center gap-4 transition-all duration-300 overflow-hidden">
                    <div class="preview-box w-20 h-20 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-lg shadow-lg">1</div>
                    <div class="preview-box w-20 h-20 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-lg shadow-lg">2</div>
                    <div class="preview-box w-20 h-20 bg-gradient-to-br from-cyan-500 to-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-lg shadow-lg">3</div>
                </div>
            </div>

            <!-- Code Output Box -->
            <div class="glass-card p-6 rounded-2xl">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider"><i class="fa-solid fa-code text-cyan-400 mr-2"></i> CSS Code Output</span>
                    <button onclick="copyCode()" class="text-xs bg-slate-800 hover:bg-slate-700 text-cyan-400 font-bold px-3 py-1.5 rounded-lg border border-slate-700 transition">
                        <i class="fa-solid fa-copy mr-1"></i> Copy CSS
                    </button>
                </div>
                <pre class="bg-slate-950 p-4 rounded-xl text-xs font-mono text-cyan-300 border border-slate-800 overflow-x-auto"><code id="cssCode">// Dynamic CSS will generate here</code></pre>
            </div>

        </div>

    </main>

    <script>
        let itemCount = 3;
        let currentStyle = 'flat';

        function updateLayout() {
            const display = document.getElementById('displayType').value;
            const dir = document.getElementById('flexDirection').value;
            const wrap = document.getElementById('flexWrap').value;
            const justify = document.getElementById('justifyContent').value;
            const gap = document.getElementById('gap').value;
            const radius = document.getElementById('borderRadius').value;

            document.getElementById('gapVal').innerText = gap + 'px';
            document.getElementById('radiusVal').innerText = radius + 'px';

            const container = document.getElementById('layoutContainer');
            const boxes = document.querySelectorAll('.preview-box');

            // Set Container Styles
            if (display === 'flex') {
                container.style.display = 'flex';
                container.style.flexDirection = dir;
                container.style.flexWrap = wrap;
                container.style.justifyContent = justify;
                container.style.gridTemplateColumns = 'none';
            } else {
                container.style.display = 'grid';
                container.style.gridTemplateColumns = `repeat(auto-fit, minmax(80px, 1fr))`;
                container.style.justifyContent = justify;
            }

            container.style.gap = gap + 'px';

            // Apply Box Styles (Flat vs Glass vs Neumorphism)
            boxes.forEach(box => {
                box.style.borderRadius = radius + 'px';
                
                if (currentStyle === 'flat') {
                    box.className = 'preview-box w-20 h-20 bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-white text-lg shadow-lg';
                    box.style.background = '';
                    box.style.boxShadow = '';
                    box.style.backdropFilter = '';
                    box.style.border = '';
                } 
                else if (currentStyle === 'glass') {
                    box.className = 'preview-box w-20 h-20 flex items-center justify-center font-bold text-white text-lg';
                    box.style.background = 'rgba(255, 255, 255, 0.08)';
                    box.style.backdropFilter = 'blur(10px)';
                    box.style.border = '1px solid rgba(255, 255, 255, 0.2)';
                    box.style.boxShadow = '0 8px 32px 0 rgba(0, 0, 0, 0.37)';
                } 
                else if (currentStyle === 'neumorphic') {
                    box.className = 'preview-box w-20 h-20 flex items-center justify-center font-bold text-cyan-400 text-lg';
                    box.style.background = '#0f172a';
                    box.style.backdropFilter = '';
                    box.style.border = 'none';
                    box.style.boxShadow = '6px 6px 12px #0a0f1c, -6px -6px 12px #141f38';
                }
            });

            // Generate CSS Text
            let cssText = `.container {\n  display: ${display};\n`;
            if (display === 'flex') {
                cssText += `  flex-direction: ${dir};\n  flex-wrap: ${wrap};\n`;
            } else {
                cssText += `  grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));\n`;
            }
            cssText += `  justify-content: ${justify};\n  gap: ${gap}px;\n}\n\n.item {\n  border-radius: ${radius}px;\n`;

            if (currentStyle === 'glass') {
                cssText += `  background: rgba(255, 255, 255, 0.08);\n  backdrop-filter: blur(10px);\n  border: 1px solid rgba(255, 255, 255, 0.2);\n  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);\n`;
            } else if (currentStyle === 'neumorphic') {
                cssText += `  background: #0f172a;\n  box-shadow: 6px 6px 12px #0a0f1c, -6px -6px 12px #141f38;\n`;
            } else {
                cssText += `  background: linear-gradient(135deg, #06b6d4, #2563eb);\n`;
            }
            cssText += `}`;

            document.getElementById('cssCode').innerText = cssText;
        }

        function setStyle(styleName) {
            currentStyle = styleName;
            ['flat', 'glass', 'neu'].forEach(id => {
                const btn = document.getElementById('btn-' + id);
                btn.className = 'text-xs bg-slate-800 text-slate-400 border border-slate-700 font-bold py-2 rounded-xl hover:text-white';
            });
            const activeBtn = document.getElementById(styleName === 'neumorphic' ? 'btn-neu' : 'btn-' + styleName);
            activeBtn.className = 'text-xs bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 font-bold py-2 rounded-xl';
            updateLayout();
        }

        function addBox() {
            itemCount++;
            const container = document.getElementById('layoutContainer');
            const newBox = document.createElement('div');
            newBox.innerText = itemCount;
            container.appendChild(newBox);
            updateLayout();
        }

        function removeBox() {
            if (itemCount > 1) {
                itemCount--;
                const container = document.getElementById('layoutContainer');
                container.removeChild(container.lastElementChild);
                updateLayout();
            }
        }

        function copyCode() {
            const code = document.getElementById('cssCode').innerText;
            navigator.clipboard.writeText(code);
            alert('CSS Code Copied!');
        }

        updateLayout();
    </script>
</body>
</html>
